transform="translate(0,-3.8585358)"/><text id="text4316" x="235.366" y="182.621" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan4320" x="235.366" y="182.621">Puts one message on an activemq queue for</tspan><tspan id="tspan4324" x="235.366" y="207.621">each of the materials.</tspan></text></g><g id="g4539" transform="translate(-54.994285,0)"><path id="path4326" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 430.64828,287.11593 0,67.52173"/><g id="g4534"><rect id="rect4510" width="233.647" height="45.014" x="313.843" y="358.504" fill="none" stroke="#000" stroke-dasharray="none" stroke-miterlimit="4" stroke-opacity="1" stroke-width="2"/><text id="text4512" x="327.228" y="386.402" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan4514" x="327.228" y="386.402">Material Update Queue</tspan></text></g></g><g id="g5578" transform="translate(-2.0509636,0)"><g id="g4762" transform="translate(-52.943354,0)"><path id="path4546" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 403.8805,415.5852 -90.02897,75.02414"/><path id="path4730" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 457.4288,415.5852 90.02897,75.02414"/><path id="path4732" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 419.8805,415.5852 -47.01448,75.16769"/><path id="path4736" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 442.67673,415.5852 47.01448,75.16769"/><path id="path4326-8" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend)" d="m 430.64831,416.21432 0,73.95237"/></g><g id="g4848" transform="translate(5.6753315,0)"><g id="g4802" transform="translate(-76.168991,0)"><g id="g4793" transform="translate(14.24147,-30)"><rect id="rect4510-2" width="269.015" height="45.014" x="299.467" y="532.552" fill="none" stroke="#000" stroke-dasharray="none" stroke-miterlimit="4" stroke-opacity="1" stroke-width="2"/><text id="text4512-9" x="318.584" y="560.45" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan4514-9" x="318.584" y="560.45">Material Update Listeners</tspan></text></g><text font-stretch="normal" style="line-height:125%;-inkscape-font-specification:Georgia" id="text4798" x="351.079" y="566.849" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve"><tspan id="tspan4800" x="351.079" y="566.849">(By default, 10 listeners)</tspan></text></g><g id="g4824" transform="translate(-87.745087,0)"><text font-stretch="normal" style="line-height:125%;-inkscape-font-specification:Georgia" id="text4810" x="303.127" y="602.217" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve"><tspan id="tspan4812" x="303.127" y="602.217">1. Each listener picks MUS&apos; message off</tspan><tspan id="tspan4846" x="303.127" y="624.717"> the queue.</tspan></text><text id="text4814" x="304.279" y="650.217" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan4818" x="304.279" y="650.217">2. Loads information, from DB, for this</tspan><tspan id="tspan4822" x="304.279" y="672.717"> material (using MaterialRepository).</tspan></text></g></g></g><g id="g5084" transform="translate(-34,103.21484)"><text font-stretch="normal" style="line-height:125%;-inkscape-font-specification:Georgia" id="text4864" x="1" y="733.375" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve"><tspan id="tspan4866" x="1" y="733.375" font-size="20">1. Expand material for history</tspan><tspan id="tspan4868" x="1" y="758.375" font-size="20"> (Find all SVN externals in</tspan><tspan id="tspan4888" x="1" y="783.375" font-size="20"> case of SVN).</tspan></text><text id="text4925" x="-1" y="935.016" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan4945" x="-1" y="935.016">3. Post a message on the &quot;Material</tspan><tspan id="tspan4947" x="-1" y="960.016"> Update Completed&quot; topic queue</tspan><tspan id="tspan4949" x="-1" y="985.016"> that an MDU check is done.</tspan></text><text font-stretch="normal" style="line-height:125%;-inkscape-font-specification:Georgia" id="text5011" x="1" y="821.696" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve"><tspan id="tspan5013" x="1" y="821.696" font-size="20">2. For the material (or materials</tspan><tspan id="tspan5015" x="1" y="846.696" font-size="20"> in SVN externals case), find the</tspan><tspan id="tspan5017" x="1" y="871.696" font-size="20"> latest modification (latest commit</tspan><tspan id="tspan5019" x="1" y="896.696" font-size="20"> details) and insert that in the DB.</tspan></text></g><g id="g5122" transform="translate(66,116)"><text id="text5054" x="441" y="720.59" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan5060" x="441" y="720.59">1. Find last known modification for</tspan><tspan id="tspan5106" x="441" y="745.59"> this material (previous commit</tspan><tspan id="tspan5108" x="441" y="770.59"> seen by Go).</tspan></text><text font-stretch="normal" style="line-height:125%;-inkscape-font-specification:Georgia" id="text5062" x="439" y="945.453" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve"><tspan id="tspan5064" x="439" y="945.453">3. Post a message on the &quot;Material</tspan><tspan id="tspan5066" x="439" y="970.453"> Update Completed&quot; topic queue</tspan><tspan id="tspan5068" x="439" y="995.453"> that an MDU check is done.</tspan></text><text id="text5070" x="441" y="810.043" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="20" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" word-spacing="0" xml:space="preserve" style="line-height:125%;-inkscape-font-specification:Georgia"><tspan id="tspan5072" x="441" y="810.043">2. For the material (or materials</tspan><tspan id="tspan5076" x="441" y="835.043"> in SVN externals case), find all</tspan><tspan id="tspan5114" x="441" y="860.043"> modifications since (newer than)</tspan><tspan id="tspan5078" x="441" y="885.043"> the previously seen modification.</tspan><tspan id="tspan5082" x="441" y="910.043"> Insert them into the DB.</tspan></text></g><g id="g5514" transform="translate(0,60)"><path id="path5138" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" d="m 377.59502,635.6164 0,83.69849"/><path id="path5140" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend-4)" d="m 377.59502,719.13811 -266.78011,-0.17678 -1,33.91511"/><path id="path5144" fill="none" stroke="#000" stroke-linecap="butt" stroke-linejoin="miter" stroke-opacity="1" stroke-width="1" marker-end="url(#Arrow2Lend-4)" d="m 377.81491,719.13811 266.78011,-0.17678 1,33.91511"/></g><text id="text5519" x="109.655" y="747.362" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-stretch="normal" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" text-anchor="middle" word-spacing="0" xml:space="preserve" style="text-align:center;line-height:125%;-inkscape-font-specification:Georgia"><tspan style="text-align:center" id="tspan5521" x="109.655" y="747.362" font-size="14" text-anchor="middle">(If this material has not been</tspan><tspan style="text-align:center" id="tspan5523" x="109.655" y="764.862" font-size="14" text-anchor="middle">seen by Go before this time)</tspan></text><text font-stretch="normal" style="text-align:center;line-height:125%;-inkscape-font-specification:Georgia" id="text5529" x="644" y="747.362" fill="#000" fill-opacity="1" stroke="none" font-family="Georgia" font-size="18" font-style="normal" font-variant="normal" font-weight="normal" letter-spacing="0" text-anchor="middle" word-spacing="0" xml:space="preserve"><tspan id="tspan5531" x="644" y="747.362" font-size="14" text-anchor="middle" style="text-align:center">(If this material has been</tspan><tspan id="tspan5533" x="644" y="764.862" font-size="14" text-anchor="middle" style="text-align:center">seen by Go before)</tspan></text></g></svg>